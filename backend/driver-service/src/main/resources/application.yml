server:
  port: 8081

spring:
  application:
    name: driver-service
  datasource:
    url: jdbc:postgresql://localhost:5433/ride_hailing
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      cluster-nodes: localhost:9200
  elasticsearch:
    uris: http://localhost:9200
